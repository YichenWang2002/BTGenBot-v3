    scenario_family: pickplace
  - path: configs/generated/pickplace_hard/pickplace_hard_idx13_seed1_robots3.yaml
    scenario_family: pickplace
  - path: configs/generated/pickplace_hard/pickplace_hard_idx13_seed2_robots3.yaml
    scenario_family: pickplace
